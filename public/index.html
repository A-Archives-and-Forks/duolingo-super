<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Super Duolingo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1CB0F6;
    --blue-dark:  #0091C8;
    --blue-dim:   #F0FAFF;
    --blue-border:#C2E8FB;
    --green:      #58CC02;
    --red:        #FF4B4B;
    --ink:        #1F1F1F;
    --muted:      #8A8A8A;
    --border:     #E5E5E5;
    --surface:    #F7F7F7;
    --white:      #FFFFFF;
    --radius-sm:  10px;
    --radius-md:  14px;
    --radius-lg:  24px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #F0FAFF;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    min-height: 100vh;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 2px solid var(--border);
    box-shadow: 0 4px 0 var(--border);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    animation: slideUp .45s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    padding: 2rem 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    border-bottom: 2px solid var(--border);
  }

  .owl-wrap {
    margin-bottom: 1rem;
    animation: bobble 3s ease-in-out infinite;
  }

  @keyframes bobble {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #E8FFF0;
    border: 1.5px solid #A8EAB8;
    color: #1A7A3A;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 5px var(--green);
  }

  .header-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }

  /* Body */
  .body { padding: 1.75rem 2rem 2rem; }

  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  .token-input {
    width: 100%;
    padding: 14px 48px 14px 16px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border);
    background: var(--surface);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  .token-input::placeholder { color: #bbb; font-weight: 600; }

  .token-input:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(28,176,246,0.14);
  }

  .eye-btn {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #ccc; padding: 4px;
    display: flex; align-items: center;
    transition: color .15s; border-radius: 6px;
  }
  .eye-btn:hover { color: var(--blue); }

  .btn {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--blue);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 4px 0 var(--blue-dark);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .btn:not(:disabled):hover {
    background: #29BBFF;
    transform: translateY(-1px);
    box-shadow: 0 6px 0 var(--blue-dark);
  }

  .btn:not(:disabled):active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--blue-dark);
  }

  .btn:disabled {
    opacity: .55; cursor: not-allowed;
    transform: none; box-shadow: 0 4px 0 var(--blue-dark);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .65s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result {
    margin-top: 1rem;
    padding: 13px 15px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 700;
    display: none;
    align-items: center; gap: 10px;
    animation: popIn .25s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes popIn {
    from { opacity:0; transform:scale(.96) translateY(6px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .result.show { display: flex; }

  .result.ok {
    background: #F0FBE8;
    border: 2px solid #B5EDA0;
    color: #337A00;
  }

  .result.err {
    background: #FFF0F0;
    border: 2px solid #FFC5C5;
    color: #C8000A;
  }

  .result-icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: #fff;
  }

  .result.ok  .result-icon { background: var(--green); }
  .result.err .result-icon { background: var(--red); }

  .hint {
    margin-top: 1.25rem;
    padding: 14px 16px;
    background: var(--blue-dim);
    border: 2px solid var(--blue-border);
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 600;
    color: #3A6D85;
    line-height: 1.75;
  }

  .hint b { color: var(--blue-dark); font-weight: 800; }
  .hint a  { color: var(--blue); text-decoration: none; font-weight: 800; }
  .hint a:hover { text-decoration: underline; }

  .hint code {
    display: inline-block;
    margin-top: 6px;
    background: #D6F0FB;
    color: #006B99;
    padding: 4px 9px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 11.5px;
    font-weight: 700;
    word-break: break-all;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="header-title">Activate Super Duolingo</div>
    <div class="header-sub">Enter your JWT token to unlock Super for free</div>
  </div>

  <div class="body">

    <label class="field-label" for="token">JWT Token</label>
    <div class="input-wrap">
      <input
        class="token-input"
        id="token"
        type="password"
        placeholder="Paste your JWT token here..."
        autocomplete="off"
      />
      <button class="eye-btn" onclick="toggleVis()" title="Show / hide token">
        <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="btn" id="btn" onclick="activate()">
      <span id="btn-content">Activate Now</span>
    </button>

    <div class="result" id="result">
      <div class="result-icon" id="result-icon"></div>
      <span id="result-text"></span>
    </div>

    <div class="hint">
      <b>How to get your JWT token:</b><br>
      Go to <a href="https://duolingo.com" target="_blank">duolingo.com</a>
      → press F12 → open the Console tab → paste:<br>
      <code>document.cookie.match(/jwt_token=([^;]+)/)[1]</code>
    </div>

  </div>
</div>

<script>
  let visible = false;

  function toggleVis() {
    const inp = document.getElementById('token');
    visible = !visible;
    inp.type = visible ? 'text' : 'password';
    document.getElementById('eye-icon').innerHTML = visible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }

  function showResult(msg, ok) {
    const box  = document.getElementById('result');
    const icon = document.getElementById('result-icon');
    const text = document.getElementById('result-text');
    box.className    = 'result show ' + (ok ? 'ok' : 'err');
    icon.textContent = ok ? '✓' : '✕';
    text.textContent = msg;
  }

  async function activate() {
    const token = document.getElementById('token').value.trim();
    const btn   = document.getElementById('btn');
    const label = document.getElementById('btn-content');

    if (!token) { showResult('Please enter your JWT token.', false); return; }

    btn.disabled = true;
    label.innerHTML = '<div class="spinner"></div>';
    document.getElementById('result').className = 'result';

    try {
      const res  = await fetch('/api/activate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        showResult(data.message || 'Super Duolingo activated successfully!', true);
      } else {
        showResult(data.error || 'An unknown error occurred.', false);
      }
    } catch {
      showResult('Could not connect to the server.', false);
    }

    btn.disabled = false;
    label.textContent = 'Activate Now';
  }

  document.getElementById('token').addEventListener('keydown', e => {
    if (e.key === 'Enter') activate();
  });
</script>
</body>
</html>
